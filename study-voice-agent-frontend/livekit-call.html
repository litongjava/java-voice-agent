<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LiveKit 双端通话测试</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input { padding: 10px; min-width: 220px; }
    button { padding: 10px 14px; cursor: pointer; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f7f7f7; padding: 12px; border-radius: 8px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin-top: 14px; }
  </style>
</head>
<body>
  <h2>LiveKit 双端通话测试</h2>

  <div class="card">
    <div class="row">
      <label>Room</label>
      <input id="room" value="test" />
      <label>Identity</label>
      <input id="identity" value="u1" />
      <button id="btnJoin">Join</button>
      <button id="btnLeave" disabled>Leave</button>
    </div>
    <div style="margin-top:10px">
      <audio id="remoteAudio" autoplay></audio>
    </div>
  </div>

  <div class="card">
    <strong>日志</strong>
    <pre id="log"></pre>
  </div>

  <!-- UMD：全局 LiveKitClient -->

<script type="module">
  import {
    Room,
    RoomEvent,
    createLocalAudioTrack
  } from "https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.esm.mjs";

  const el = (id) => document.getElementById(id);
  const logEl = el("log");
  const roomEl = el("room");
  const identityEl = el("identity");
  const btnJoin = el("btnJoin");
  const btnLeave = el("btnLeave");
  const remoteAudio = el("remoteAudio");

  function logLine(s) {
    logEl.textContent += s + "\n";
    logEl.scrollTop = logEl.scrollHeight;
  }

  let room = null;

  async function fetchToken(roomName, identity) {
    const url = `/api/v1/livekit/token?room=${encodeURIComponent(roomName)}&identity=${encodeURIComponent(identity)}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("token endpoint http " + resp.status);

    const json = await resp.json();

    if (!json.ok || !json.data?.url || !json.data?.token) {
      throw new Error("bad token response");
    }

    return json.data;
  }

  btnJoin.onclick = async () => {
    try {
      const roomName = roomEl.value.trim() || "test";
      const identity = identityEl.value.trim() || ("u" + Date.now());

      const tok = await fetchToken(roomName, identity);
      logLine("[token] ok");

      room = new Room();

      room.on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
        logLine(`[sub] ${participant.identity} ${track.kind}`);
        if (track.kind === "audio") {
          track.attach(remoteAudio);
        }
      });

      room.on(RoomEvent.ParticipantConnected, (p) => {
        logLine(`[join] ${p.identity}`);
      });

      room.on(RoomEvent.ParticipantDisconnected, (p) => {
        logLine(`[leave] ${p.identity}`);
      });

      await room.connect(tok.url, tok.token);
      logLine("[room] connected");

      const localTrack = await createLocalAudioTrack();
      await room.localParticipant.publishTrack(localTrack);
      logLine("[pub] local audio");

      btnJoin.disabled = true;
      btnLeave.disabled = false;
    } catch (e) {
      logLine("[err] " + (e?.message || e));
    }
  };

  btnLeave.onclick = () => {
    if (room) {
      room.disconnect();
      room = null;
    }
    btnJoin.disabled = false;
    btnLeave.disabled = true;
    logLine("[room] disconnected");
  };
</script>
</body>
</html>
